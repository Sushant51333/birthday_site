
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>
  <link rel="stylesheet" href="hb.css">
</head>
<body>

  <div class="container">
    <h1>Happy Birthday My Cute Psyduck ❤️</h1>

    <div class="typing" id="typing"></div>

    <!-- Slideshow -->
    <div class="slideshow">
      <img class="slides" src="img1.jpeg" alt="Birthday celebration photo 1">
      <img class="slides" src="img2.jpeg" alt="Birthday celebration photo 2">
      <img class="slides" src="img3.jpeg" alt="Birthday celebration photo 3">
      <img class="slides" src="img4.jpeg" alt="Birthday celebration photo 4">
    </div>

    <!-- Countdown -->
    <div class="countdown" id="countdown"></div>

    <button onclick="startCelebration()">Start Surprise 🎁</button>

    <!-- Music -->
    <audio id="music" loop>
      <source src="Song.mp3" type="audio/mp3">
    </audio>
  </div>

  <canvas id="fireworks"></canvas>

  <script src="hb.js"></script>

</body>
</html>
